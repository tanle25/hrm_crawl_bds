# BDS Agent — docker-compose
version: "3.9"

services:
  bds:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bds-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY:-}
      - OLLAMA_CLOUD_API_BASE=${OLLAMA_CLOUD_API_BASE:-}
      - PYTHONUNBUFFERED=1
      - PYTORCH_MPS_HIGH_WATERMARK_RATIO=0.0
    volumes:
      # Mount browser profile so cookies persist across restarts
      - bds-profile:/app/browser_profile_desktop
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  bds-profile:
